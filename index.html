<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Timebox</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="loading" class="loading" role="status" aria-live="polite">
    <div class="loading-box">保存データを読み込んでいます…</div>
  </div>

  <header class="app-header">
    <button id="menu-button" class="icon-button" type="button" aria-label="メニューを開く" aria-expanded="false" aria-controls="side-menu">☰</button>
    <div class="header-title">
      <span id="screen-label">今日の予定</span>
      <strong id="header-date"></strong>
    </div>
    <button id="timer-return-button" class="header-action" type="button" hidden>タイマーへ</button>
  </header>

  <div id="menu-backdrop" class="menu-backdrop" hidden></div>
  <nav id="side-menu" class="side-menu" aria-label="メインメニュー" aria-hidden="true">
    <div class="menu-heading">
      <strong>Timebox</strong>
      <button id="menu-close-button" class="icon-button" type="button" aria-label="メニューを閉じる">×</button>
    </div>
    <button type="button" data-navigation="today">今日</button>
    <button type="button" data-navigation="history">履歴</button>
    <button id="menu-timer-button" type="button" data-navigation="timer" disabled>実行中タイマーへ戻る</button>
    <hr>
    <button type="button" disabled>検索 <span>今後追加予定</span></button>
    <button type="button" disabled>設定 <span>今後追加予定</span></button>
  </nav>

  <main id="app" class="app-shell" hidden>
    <section id="schedule-view" class="view" aria-labelledby="schedule-title">
      <div class="view-heading">
        <div>
          <p class="eyebrow">日付別予定</p>
          <h1 id="schedule-title">今日のタイムボックス</h1>
        </div>
        <button id="add-plan-button" class="primary" type="button">予定を追加</button>
      </div>

      <div class="date-navigation panel">
        <button id="previous-day-button" type="button" aria-label="前の日">‹ 前日</button>
        <label for="selected-date">表示日</label>
        <input id="selected-date" type="date">
        <button id="today-button" type="button">今日</button>
        <button id="next-day-button" type="button" aria-label="次の日">翌日 ›</button>
      </div>

      <div id="readonly-notice" class="notice" hidden>過去日は閲覧専用です。予定の登録・編集・開始・手動完了はできません。</div>

      <div class="schedule-tools">
        <button id="copy-previous-button" type="button">前日の予定をコピー</button>
        <span id="schedule-summary" class="muted"></span>
      </div>

      <section class="panel" aria-labelledby="clock-list-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">時刻指定</p>
            <h2 id="clock-list-title">簡易時刻表</h2>
          </div>
        </div>
        <div id="clock-plan-list" class="card-list"></div>
      </section>

      <section class="panel" aria-labelledby="duration-list-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">時間指定</p>
            <h2 id="duration-list-title">時刻未指定タスク</h2>
          </div>
        </div>
        <div id="duration-plan-list" class="card-list"></div>
      </section>

      <details id="finished-section" class="panel finished-panel">
        <summary><span>完了・スキップ済み</span><span id="finished-count" class="count-badge">0</span></summary>
        <div id="finished-plan-list" class="card-list finished-list"></div>
      </details>
    </section>

    <section id="timer-view" class="view" aria-labelledby="timer-title" hidden>
      <div id="timer-panel" class="timer-panel panel">
        <p id="timer-status" class="timer-status">実行中</p>
        <h1 id="timer-title">タイマー</h1>
        <div id="timer-clock" class="timer-clock" aria-live="off">00:00</div>
        <p id="timer-overtime" class="timer-overtime" hidden></p>
        <div class="timer-meta">
          <span id="timer-kind" class="type-badge"></span>
          <span id="timer-planned"></span>
          <span id="timer-date"></span>
        </div>
        <p id="timer-note" class="timer-note"></p>
        <div class="timer-actions">
          <button id="pause-resume-button" class="primary" type="button">一時停止</button>
          <button id="complete-timer-button" type="button">完了</button>
          <button id="extend-timer-button" type="button">5分延長</button>
          <button id="skip-timer-button" class="danger" type="button">スキップ</button>
        </div>
        <button id="back-to-schedule-button" class="text-button" type="button">予定画面を見る</button>
      </div>
    </section>

    <section id="history-view" class="view" aria-labelledby="history-title" hidden>
      <div class="view-heading">
        <div>
          <p class="eyebrow">閲覧専用</p>
          <h1 id="history-title">日別履歴</h1>
        </div>
      </div>
      <div class="date-navigation panel">
        <button id="history-previous-button" type="button">‹ 前日</button>
        <label for="history-date">表示日</label>
        <input id="history-date" type="date">
        <button id="history-today-button" type="button">今日</button>
        <button id="history-next-button" type="button">翌日 ›</button>
      </div>
      <div id="history-metrics" class="metrics-grid"></div>
      <section class="panel" aria-labelledby="history-entry-title">
        <h2 id="history-entry-title">記録</h2>
        <div id="history-list" class="card-list"></div>
      </section>
    </section>
  </main>

  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <dialog id="plan-dialog" aria-labelledby="plan-dialog-title">
    <form id="plan-form" method="dialog" novalidate>
      <div class="dialog-heading">
        <h2 id="plan-dialog-title">予定を追加</h2>
        <button class="icon-button" type="button" data-close-dialog="plan-dialog" aria-label="閉じる">×</button>
      </div>
      <div id="plan-form-error" class="form-error" role="alert" hidden></div>
      <input id="plan-id" type="hidden">
      <div class="field">
        <label for="plan-title">作業名 <span aria-hidden="true">*</span></label>
        <input id="plan-title" name="title" type="text" maxlength="120" required aria-describedby="plan-form-error">
      </div>
      <div class="field">
        <label for="plan-note">メモ</label>
        <textarea id="plan-note" name="note" rows="3" maxlength="1000"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="plan-kind">種類</label>
          <select id="plan-kind" name="kind">
            <option value="work">作業</option>
            <option value="break">休憩</option>
          </select>
        </div>
        <div class="field">
          <label for="plan-date">対象日</label>
          <input id="plan-date" name="date" type="date" required>
        </div>
      </div>
      <fieldset>
        <legend>登録方式</legend>
        <div class="segmented">
          <label><input type="radio" name="scheduleType" value="duration" checked>時間指定</label>
          <label><input type="radio" name="scheduleType" value="clock">時刻指定</label>
        </div>
      </fieldset>
      <div id="duration-fields" class="field">
        <label for="plan-duration">時間（分）</label>
        <input id="plan-duration" name="durationMinutes" type="number" min="1" max="1440" step="1" inputmode="numeric" value="30">
      </div>
      <div id="clock-fields" class="field-row" hidden>
        <div class="field">
          <label for="plan-start-time">開始時刻</label>
          <input id="plan-start-time" name="startTime" type="time" value="09:00">
        </div>
        <div class="field">
          <label for="plan-end-time">終了時刻</label>
          <input id="plan-end-time" name="endTime" type="time" value="09:30">
        </div>
      </div>
      <p id="running-edit-notice" class="notice" hidden>実行中の予定は作業名とメモだけ編集できます。</p>
      <div class="dialog-actions">
        <button type="button" data-close-dialog="plan-dialog">キャンセル</button>
        <button class="primary" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="late-start-dialog" aria-labelledby="late-start-title">
    <form method="dialog">
      <div class="dialog-heading"><h2 id="late-start-title">遅れて開始します</h2></div>
      <p id="late-start-message"></p>
      <div class="stacked-actions">
        <button id="start-full-button" class="primary" type="button">予定時間をすべて実行</button>
        <button id="start-until-end-button" type="button">本来の終了時刻まで実行</button>
        <button type="button" data-close-dialog="late-start-dialog">キャンセル</button>
      </div>
    </form>
  </dialog>

  <dialog id="manual-dialog" aria-labelledby="manual-title">
    <form id="manual-form" method="dialog" novalidate>
      <div class="dialog-heading"><h2 id="manual-title">手動で完了</h2></div>
      <p id="manual-plan-name"></p>
      <div id="manual-error" class="form-error" role="alert" hidden></div>
      <div class="field">
        <label for="manual-minutes">実績時間（分・省略時は0分）</label>
        <input id="manual-minutes" type="number" min="0" max="10080" step="1" inputmode="numeric" aria-describedby="manual-error">
      </div>
      <div class="dialog-actions">
        <button type="button" data-close-dialog="manual-dialog">キャンセル</button>
        <button class="primary" type="submit">完了を記録</button>
      </div>
    </form>
  </dialog>

  <dialog id="expired-complete-dialog" aria-labelledby="expired-complete-title">
    <form method="dialog">
      <div class="dialog-heading"><h2 id="expired-complete-title">実績時間を選択</h2></div>
      <p>終了予定時刻を過ぎています。履歴へ記録する時間を選んでください。</p>
      <div class="stacked-actions">
        <button id="complete-planned-button" type="button">予定時間までを記録</button>
        <button id="complete-overtime-button" class="primary" type="button">超過時間も含めて記録</button>
        <button type="button" data-close-dialog="expired-complete-dialog">キャンセル</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-dialog" aria-labelledby="confirm-title">
    <form method="dialog">
      <div class="dialog-heading"><h2 id="confirm-title">確認</h2></div>
      <p id="confirm-message"></p>
      <div class="dialog-actions">
        <button id="confirm-cancel-button" type="button">キャンセル</button>
        <button id="confirm-ok-button" class="primary" type="button">続ける</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
